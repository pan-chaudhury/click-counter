<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Varela+Round&display=swap" rel="stylesheet">
<style>
  :root {
    /* Spacing — 4pt scale */
    --space-2xs: 0.25rem;
    --space-xs:  0.5rem;
    --space-sm:  0.75rem;
    --space-md:  1rem;
    --space-lg:  1.5rem;
    --space-xl:  2rem;
    --space-2xl: 3rem;
    --space-3xl: 4rem;
    --space-4xl: 6rem;

    /* Color — OKLCH, Y2K bubblegum palette */
    --bg-lavender:    oklch(0.85 0.08 290);
    --bg-pink:        oklch(0.88 0.07 350);
    --bg-aqua:        oklch(0.90 0.06 195);
    --text-primary:   oklch(0.45 0.18 340);
    --text-muted:     oklch(0.60 0.06 290);
    --text-faint:     oklch(0.70 0.05 290);
    --text-frosted:   oklch(0.65 0.08 290);
    --brand-pink:     oklch(0.65 0.22 350);
    --brand-hot:      oklch(0.58 0.25 345);
    --brand-active:   oklch(0.52 0.23 345);
    --brand-shadow:   oklch(0.55 0.18 310);
    --brand-glow:     oklch(0.70 0.15 340 / 0.4);
    --jelly-bg:       oklch(0.78 0.12 345 / 0.55);
    --jelly-hover:    oklch(0.75 0.14 345 / 0.65);
    --jelly-shine:    oklch(0.95 0.02 345 / 0.5);
    --shadow-pink:    oklch(0.60 0.14 340 / 0.3);
    --shadow-lilac:   oklch(0.58 0.12 290 / 0.25);
    --shadow-aqua:    oklch(0.65 0.10 195 / 0.2);
    --combo-low:      oklch(0.72 0.10 290);
    --combo-mid:      oklch(0.58 0.25 345);
    --combo-high-a:   oklch(0.68 0.15 290);
    --combo-high-b:   oklch(0.65 0.18 195);
    --counter-pink:   oklch(0.55 0.26 345);

    /* Easing — smooth exponential, NO bounce */
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);

    /* Type */
    --font-display: 'Lilita One', cursive;
    --font-body: 'Varela Round', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-bottom: 6vh;
    background: linear-gradient(
      145deg,
      var(--bg-lavender) 0%,
      var(--bg-pink) 45%,
      var(--bg-aqua) 100%
    );
    background-attachment: fixed;
  }

  /* Iridescent shimmer overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 25% 20%, oklch(0.90 0.06 290 / 0.25), transparent),
      radial-gradient(ellipse 60% 50% at 75% 70%, oklch(0.88 0.07 195 / 0.2), transparent),
      radial-gradient(ellipse 50% 40% at 50% 40%, oklch(0.92 0.04 350 / 0.15), transparent);
    pointer-events: none;
    z-index: 0;
    animation: shimmer-drift 8s ease-in-out infinite alternate;
  }

  /* Frosted bubble texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, oklch(0.95 0.03 290 / 0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 60%, oklch(0.93 0.04 195 / 0.1) 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, oklch(0.94 0.03 345 / 0.08) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes shimmer-drift {
    0% { opacity: 0.6; transform: scale(1) translate(0, 0); }
    100% { opacity: 1; transform: scale(1.05) translate(1%, -1%); }
  }

  canvas#confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .main-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
    position: relative;
    z-index: 1;
  }

  .counter {
    font-family: var(--font-display);
    font-size: clamp(5rem, 16vw, 9rem);
    font-weight: 400;
    color: var(--counter-pink);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
    margin-bottom: var(--space-lg);
    text-shadow:
      0 4px 12px var(--shadow-pink),
      0 2px 0 oklch(0.50 0.20 345 / 0.15);
    transition:
      transform 0.2s var(--ease-out),
      opacity 0.2s var(--ease-out);
    will-change: transform;
  }

  .counter.pop {
    transform: scale(1.18);
  }

  /* === JELLY BUTTON === */
  .btn-click {
    appearance: none;
    border: none;
    outline: none;
    cursor: pointer;
    position: relative;
    z-index: 2;
    background: var(--jelly-bg);
    color: oklch(0.98 0.01 345);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: clamp(1.15rem, 3.5vw, 1.4rem);
    letter-spacing: 0.03em;
    padding: 1em 2.8em;
    min-height: 3.25rem;
    border-radius: 6rem;
    box-shadow:
      0 6px 0 0 var(--brand-shadow),
      0 8px 24px var(--shadow-pink),
      0 12px 40px var(--shadow-lilac),
      inset 0 -2px 4px oklch(0.50 0.15 345 / 0.15);
    transition:
      transform 0.12s var(--ease-out),
      box-shadow 0.12s var(--ease-out),
      background 0.1s var(--ease-out);
    overflow: hidden;
    isolation: isolate;
  }

  /* Glossy plastic highlight */
  .btn-click::before {
    content: '';
    position: absolute;
    top: 2px;
    left: 12%;
    right: 12%;
    height: 40%;
    background: linear-gradient(
      180deg,
      var(--jelly-shine) 0%,
      oklch(0.95 0.01 345 / 0.08) 100%
    );
    border-radius: 6rem 6rem 50% 50%;
    pointer-events: none;
    z-index: 1;
  }

  .btn-click:hover {
    background: var(--jelly-hover);
  }

  .btn-click:active,
  .btn-click.pressed {
    background: oklch(0.70 0.16 345 / 0.7);
    transform: translateY(5px) scale(0.95);
    box-shadow:
      0 1px 0 0 var(--brand-shadow),
      0 2px 8px var(--shadow-pink),
      0 4px 12px var(--shadow-lilac),
      inset 0 2px 6px oklch(0.50 0.15 345 / 0.2);
  }

  .reset {
    margin-top: var(--space-lg);
    background: none;
    border: none;
    outline: none;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--text-frosted);
    letter-spacing: 0.04em;
    text-transform: lowercase;
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--space-xs);
    transition: color 0.15s var(--ease-out), opacity 0.15s var(--ease-out);
    opacity: 0.7;
  }

  .reset:hover {
    color: var(--combo-low);
    opacity: 1;
  }

  /* Combo zone */
  .combo-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2xs);
    min-height: 3rem;
    position: relative;
    z-index: 1;
  }

  .combo-multiplier {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--combo-low);
    opacity: 0;
    transform: scale(0.6);
    transition:
      opacity 0.25s var(--ease-out),
      transform 0.25s var(--ease-out),
      color 0.3s var(--ease-out);
    will-change: transform, opacity;
    line-height: 1;
  }

  .combo-multiplier.active {
    opacity: 1;
    transform: scale(1);
  }

  .combo-multiplier.breaking {
    opacity: 0;
    transform: scale(0.6);
    transition:
      opacity 0.19s var(--ease-out),
      transform 0.19s var(--ease-out);
  }

  .cps-display {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    transition: color 0.25s var(--ease-out);
    opacity: 0.6;
  }

  .best-combo {
    position: fixed;
    top: var(--space-lg);
    right: var(--space-lg);
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s var(--ease-out);
    background: oklch(0.92 0.04 290 / 0.4);
    padding: var(--space-2xs) var(--space-sm);
    border-radius: var(--space-sm);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .best-combo.visible {
    opacity: 1;
  }

  /* Screen shake */
  @keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    12% { transform: translate(-1.5px, 0.5px); }
    37% { transform: translate(1.5px, -0.5px); }
    62% { transform: translate(-0.5px, 1px); }
    87% { transform: translate(1px, -0.5px); }
  }

  body.shaking {
    animation: shake 0.12s var(--ease-out);
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .counter.pop { transform: none; }
    body.shaking { animation: none; }
    body::before { animation: none; }
  }

  /* Breathing room on large screens */
  @media (min-width: 768px) {
    .counter {
      margin-bottom: var(--space-xl);
    }
  }
</style>
</head>
<body>

<div class="main-stack">
  <div class="combo-zone">
    <div class="combo-multiplier" id="comboMultiplier">2×</div>
    <div class="cps-display" id="cpsDisplay">0.0 cps</div>
  </div>
  <div class="counter" id="counter">0</div>
  <button class="btn-click" id="clickBtn">Tap!</button>
  <button class="reset" id="resetBtn">start over</button>
</div>
<div class="best-combo" id="bestCombo">Best: 1×</div>
<canvas id="confetti"></canvas>

<script>
(function() {
  let count = 0;
  const counterEl = document.getElementById('counter');
  const clickBtn = document.getElementById('clickBtn');
  const resetBtn = document.getElementById('resetBtn');
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');

  // Canvas sizing
  function resizeCanvas() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Confetti — translucent pastel candy colors
  const particles = [];
  const CONFETTI_COLORS = [
    'oklch(0.82 0.12 345 / 0.75)',   // bubblegum pink
    'oklch(0.85 0.08 290 / 0.7)',    // soft lilac
    'oklch(0.88 0.09 195 / 0.7)',    // baby aqua
    'oklch(0.86 0.10 80 / 0.65)',    // lemon drop
    'oklch(0.80 0.14 330 / 0.7)',    // rose candy
    'oklch(0.84 0.07 150 / 0.65)',   // mint jelly
  ];

  function spawnConfetti(x, y, amount) {
    for (let i = 0; i < amount; i++) {
      const angle = (Math.PI * 2 * i / amount) + (Math.random() - 0.5) * 0.6;
      const speed = 2.5 + Math.random() * 4.5;
      const size = 3.5 + Math.random() * 5;
      const shapeRoll = Math.random();
      let shape;
      if (shapeRoll < 0.3) shape = 'circle';
      else if (shapeRoll < 0.55) shape = 'heart';
      else if (shapeRoll < 0.8) shape = 'star';
      else shape = 'circle';

      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3.5 - Math.random() * 2.5,
        size: size,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        life: 1,
        decay: 0.013 + Math.random() * 0.007,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.18,
        shape: shape
      });
    }
  }

  function drawStar(ctx, cx, cy, r, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const angle = (Math.PI * i) / points - Math.PI / 2;
      const radius = i % 2 === 0 ? r : r * 0.45;
      const px = cx + Math.cos(angle) * radius;
      const py = cy + Math.sin(angle) * radius;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawHeart(ctx, cx, cy, size) {
    const s = size * 0.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy + s * 0.4);
    ctx.bezierCurveTo(cx, cy - s * 0.2, cx - s, cy - s * 0.6, cx - s, cy + s * 0.05);
    ctx.bezierCurveTo(cx - s, cy + s * 0.5, cx, cy + s * 0.8, cx, cy + s);
    ctx.bezierCurveTo(cx, cy + s * 0.8, cx + s, cy + s * 0.5, cx + s, cy + s * 0.05);
    ctx.bezierCurveTo(cx + s, cy - s * 0.6, cx, cy - s * 0.2, cx, cy + s * 0.4);
    ctx.closePath();
    ctx.fill();
  }

  let animating = false;
  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width / devicePixelRatio, canvas.height / devicePixelRatio);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.17;
      p.vx *= 0.987;
      p.life -= p.decay;
      p.rotation += p.rotSpeed;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      ctx.save();
      ctx.globalAlpha = Math.min(p.life, 0.85);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;

      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'star') {
        drawStar(ctx, 0, 0, p.size / 2, 5);
      } else if (p.shape === 'heart') {
        drawHeart(ctx, 0, -p.size * 0.15, p.size);
      }
      ctx.restore();
    }

    if (particles.length > 0) {
      requestAnimationFrame(animateParticles);
    } else {
      animating = false;
      ctx.clearRect(0, 0, canvas.width / devicePixelRatio, canvas.height / devicePixelRatio);
    }
  }

  function triggerConfetti() {
    const rect = clickBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let amount = 22;
    if (count >= 100) amount = 45;
    else if (count >= 50) amount = 35;
    spawnConfetti(cx, cy, amount);
    if (!animating) {
      animating = true;
      animateParticles();
    }
  }

  const milestones = new Set([10, 50, 100, 200, 500, 1000]);

  // Click handler
  clickBtn.addEventListener('click', function() {
    count++;
    counterEl.textContent = count;

    // Pop animation
    counterEl.classList.remove('pop');
    void counterEl.offsetWidth;
    counterEl.classList.add('pop');

    if (milestones.has(count)) {
      triggerConfetti();
    }
  });

  // Remove pop class after animation
  counterEl.addEventListener('transitionend', function() {
    counterEl.classList.remove('pop');
  });

  // Reset
  resetBtn.addEventListener('click', function() {
    count = 0;
    counterEl.textContent = '0';
    clickTimestamps = [];
    currentCPS = 0;
    currentCombo = 1;
    updateComboDisplay();
    cpsEl.textContent = '0.0 cps';
  });

  // ===== Combo Mode =====
  const comboEl = document.getElementById('comboMultiplier');
  const cpsEl = document.getElementById('cpsDisplay');
  const bestComboEl = document.getElementById('bestCombo');

  let clickTimestamps = [];
  let currentCPS = 0;
  let currentCombo = 1;
  let bestCombo = 1;
  let comboTimeout = null;
  let cpsInterval = null;

  function getCPS() {
    const now = performance.now();
    clickTimestamps = clickTimestamps.filter(t => now - t < 2000);
    if (clickTimestamps.length < 2) return clickTimestamps.length > 0 ? clickTimestamps.length : 0;
    const span = (now - clickTimestamps[0]) / 1000;
    if (span === 0) return 0;
    return (clickTimestamps.length - 1) / span;
  }

  function getComboMultiplier(cps) {
    if (cps >= 12) return 10;
    if (cps >= 9) return 7;
    if (cps >= 7) return 5;
    if (cps >= 5) return 3;
    if (cps >= 3) return 2;
    return 1;
  }

  function updateComboDisplay() {
    const combo = currentCombo;

    if (combo <= 1) {
      comboEl.classList.remove('active');
      comboEl.classList.add('breaking');
      return;
    }

    comboEl.classList.remove('breaking');
    comboEl.classList.add('active');
    comboEl.textContent = combo + '×';

    // Escalating visual: pastel → hot pink → iridescent shimmer
    if (combo >= 10) {
      // Iridescent: alternate lilac-aqua shimmer
      comboEl.style.color = 'oklch(0.60 0.22 310)';
      comboEl.style.fontSize = '2.2rem';
      comboEl.style.textShadow = '0 0 16px oklch(0.65 0.18 290 / 0.5), 0 0 32px oklch(0.70 0.14 195 / 0.3), 0 0 48px oklch(0.60 0.20 345 / 0.15)';
      document.body.classList.remove('shaking');
      void document.body.offsetWidth;
      document.body.classList.add('shaking');
    } else if (combo >= 5) {
      // Hot pink
      comboEl.style.color = 'oklch(0.58 0.25 345)';
      comboEl.style.fontSize = '1.85rem';
      comboEl.style.textShadow = '0 0 12px oklch(0.58 0.25 345 / 0.4), 0 0 24px oklch(0.60 0.20 340 / 0.15)';
      document.body.classList.remove('shaking');
    } else {
      // Pastel glow
      comboEl.style.color = 'oklch(0.72 0.10 290)';
      comboEl.style.fontSize = '1.5rem';
      comboEl.style.textShadow = '0 0 8px oklch(0.72 0.10 290 / 0.35)';
      document.body.classList.remove('shaking');
    }

    if (combo > bestCombo) {
      bestCombo = combo;
      bestComboEl.textContent = 'Best: ' + bestCombo + '×';
    }
    if (bestCombo > 1) {
      bestComboEl.classList.add('visible');
    }
  }

  function onComboClick() {
    clickTimestamps.push(performance.now());
    currentCPS = getCPS();
    currentCombo = getComboMultiplier(currentCPS);
    updateComboDisplay();

    clearTimeout(comboTimeout);
    comboTimeout = setTimeout(function() {
      currentCombo = 1;
      currentCPS = 0;
      clickTimestamps = [];
      updateComboDisplay();
      cpsEl.textContent = '0.0 cps';
    }, 1000);
  }

  // CPS display updater
  cpsInterval = setInterval(function() {
    if (clickTimestamps.length > 0) {
      currentCPS = getCPS();
      cpsEl.textContent = currentCPS.toFixed(1) + ' cps';
      if (currentCPS >= 3) {
        cpsEl.style.color = 'oklch(0.55 0.12 290)';
      } else {
        cpsEl.style.color = '';
      }
    }
  }, 100);

  clickBtn.addEventListener('click', onComboClick);

  document.body.addEventListener('animationend', function() {
    document.body.classList.remove('shaking');
  });
})();
</script>
</body>
</html>
